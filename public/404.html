<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      const pathname = window.location.pathname;
      const fallback = pathname === '/404.html' ? '/' : pathname;
      window.sessionStorage.setItem('ghumog_fallback_path', fallback + window.location.search + window.location.hash);
      window.location.replace('/index.html');
    </script>
  </head>
  <body>
    Redirecting to the app...
  </body>
</html>
